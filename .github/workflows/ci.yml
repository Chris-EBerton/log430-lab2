name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dépot
        uses: actions/checkout@v4

      - name: Créer fichier .env (TODO - utilisez les secrets)
        run: |
          echo "DB_HOST=mysql" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_NAME=labo02_db" >> .env
          echo "DB_USER=labo02" >> .env
          echo "DB_PASSWORD=labo02" >> .env
          echo "REDIS_HOST=redis" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "REDIS_DB=0" >> .env

      # Cleanup leftover containers/volumes from previous runs
      - name: Cleanup previous environment
        run: |
          docker compose down -v --remove-orphans || true
          docker rm -f mysql redis store_manager_cli || true

      - name: Démarrer le conteneur
        run: |
          docker network create labo02-network || true
          docker compose up -d

      - name: Attendre MySQL
        run: |
          sleep 10
          timeout=60
          until docker exec mysql mysqladmin ping -h localhost -u root -proot --silent; do
            echo "Waiting for MySQL..."
            sleep 3
            timeout=$((timeout - 3))
            if [ $timeout -le 0 ]; then
              echo "MySQL failed to start"
              exit 1
            fi
          done
          sleep 5

      # Explicitly clear Redis
      - name: Reset Redis
        run: |
          docker exec redis redis-cli FLUSHALL

      # Explicitly clear MySQL
      - name: Reset MySQL
        run: |
          docker exec mysql mysql \
            -uroot \
            -proot \
            -e "DROP DATABASE IF EXISTS labo02_db;"

          docker exec mysql mysql \
            -uroot \
            -proot \
            -e "CREATE DATABASE labo02_db;"

      - name: Éxécuter les tests
        run: docker exec store_manager_cli pytest

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v --remove-orphans